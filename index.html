<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Slot Car PvE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; touch-action: none; }
        #ui { position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; color: white; pointer-events: none; z-index: 10; }
        .gauge { width: 150px; height: 15px; background: #333; border: 2px solid #fff; margin-top: 5px; }
        #speed-bar { width: 0%; height: 100%; background: #0f0; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: gold; font-size: 40px; display: none; text-align: center; font-weight: bold; text-shadow: 2px 2px 4px #000; z-index: 20; }
        /* タップを促すガイド */
        #touch-area { position: absolute; bottom: 30px; width: 100%; text-align: center; color: rgba(255,255,255,0.5); font-size: 14px; }
    </style>
</head>
<body>
    <div id="ui">
        <div>SPEED: <span id="speed-text">0</span></div>
        <div class="gauge"><div id="speed-bar"></div></div>
    </div>
    
    <div id="msg">COURSE OUT!</div>
    <div id="touch-area">画面を長押しして加速</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const TRACK_RADIUS = 20;
        const CURVE_LIMIT = 0.22; 
        let gameOver = false;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // iPadの高解像度に対応
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // コース作成
        const curve = new THREE.EllipseCurve(0, 0, TRACK_RADIUS, TRACK_RADIUS * 1.6, 0, 2 * Math.PI, false, 0);
        const points = curve.getPoints(100);
        const trackGeometry = new THREE.BufferGeometry().setFromPoints(points);
        const trackMaterial = new THREE.LineBasicMaterial({ color: 0x444444 });
        const trackLine = new THREE.Line(trackGeometry, trackMaterial);
        trackLine.rotation.x = Math.PI / 2;
        scene.add(trackLine);

        function createCar(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 1.4), new THREE.MeshPhongMaterial({ color }));
            body.position.y = 0.25;
            group.add(body);
            // ヘッドライト風の飾り
            const light = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0xffffff}));
            light.position.set(0, 0.3, 0.6);
            group.add(light);
            return group;
        }

        const playerCar = createCar(0x00ff88);
        const enemyCar = createCar(0xff4400);
        scene.add(playerCar, enemyCar);

        let pPos = 0, pSpeed = 0, ePos = 0;
        let isAccelerating = false;

        // --- タッチ & キーボード入力対応 ---
        const startAccel = () => { if(!gameOver) isAccelerating = true; };
        const stopAccel = () => { isAccelerating = false; if(gameOver) location.reload(); };

        window.addEventListener('touchstart', (e) => { e.preventDefault(); startAccel(); }, {passive: false});
        window.addEventListener('touchend', stopAccel);
        window.addEventListener('mousedown', startAccel);
        window.addEventListener('mouseup', stopAccel);
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') startAccel(); });
        window.addEventListener('keyup', (e) => { if(e.code === 'Space') stopAccel(); });

        function animate() {
            requestAnimationFrame(animate);
            if (gameOver) return;

            // プレイヤー移動
            if (isAccelerating) pSpeed += 0.0006;
            else pSpeed *= 0.97;
            pPos += pSpeed;

            // コースアウト判定
            const pAngle = (pPos % 1) * Math.PI * 2;
            const curvature = Math.abs(Math.sin(pAngle)); 
            if (pSpeed > CURVE_LIMIT && curvature > 0.6) {
                endGame("COURSE OUT!");
            }

            // CPU移動（プレイヤーより少し遅めだがミスしない）
            ePos += 0.0032;

            updateCarTransform(playerCar, pPos % 1, 0);
            updateCarTransform(enemyCar, ePos % 1, 1.5);

            // カメラ設定（iPadの比率に合わせて調整）
            camera.position.lerp(new THREE.Vector3(playerCar.position.x, 12, playerCar.position.z + 18), 0.1);
            camera.lookAt(playerCar.position);

            // 勝敗判定
            if (pPos > 3 && (pPos % 1) < (ePos % 1) && pPos > ePos) {
                // 3周以上して引き離せば勝ち、などのルールも追加可能
            }

            document.getElementById('speed-text').innerText = Math.floor(pSpeed * 2000);
            document.getElementById('speed-bar').style.width = Math.min((pSpeed / CURVE_LIMIT) * 100, 100) + "%";

            renderer.render(scene, camera);
        }

        function updateCarTransform(car, t, offset) {
            const pt = curve.getPoint(t);
            car.position.set(pt.x + offset, 0, pt.y);
            const tangent = curve.getTangent(t);
            car.rotation.y = Math.atan2(-tangent.y, tangent.x) + Math.PI / 2;
        }

        function endGame(text) {
            gameOver = true;
            const msg = document.getElementById('msg');
            msg.innerHTML = text + "<br><span style='font-size:20px'>画面タップで再挑戦</span>";
            msg.style.display = "block";
        }

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
