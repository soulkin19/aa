<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRISON ESCAPE: THE COMPLEX</title>
    <style>
        :root {
            --bg: #0d0d0d; --wall: #2c2c2e; --accent: #007aff;
            --danger: #ff3b30; --success: #4cd964; --gold: #ffcc00;
        }
        body { margin: 0; background: #000; color: #eee; font-family: 'Courier New', monospace; overflow: hidden; }
        #game-view { width: 100vw; height: 100vh; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; position: relative; border: 1px solid #333; }
        
        /* 画面上部：ステータス */
        #header { height: 40px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-size: 12px; border-bottom: 1px solid #444; }
        
        /* メインシーン */
        #scene { flex: 1; position: relative; background: var(--bg); overflow: hidden; }
        
        /* 移動システム */
        .nav { position: absolute; width: 45px; height: 45px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; }
        .n { top: 10px; left: 50%; transform: translateX(-50%); }
        .s { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .e { right: 10px; top: 50%; transform: translateY(-50%); }
        .w { left: 10px; top: 50%; transform: translateY(-50%); }

        /* オブジェクト */
        .obj { position: absolute; cursor: pointer; transition: 0.2s; z-index: 10; }
        .obj:active { transform: scale(0.9); }

        /* インベントリ */
        #inventory { height: 85px; background: #111; display: flex; gap: 8px; padding: 10px; border-top: 2px solid #333; overflow-x: auto; }
        .slot { min-width: 65px; height: 65px; background: #222; border: 2px solid #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; position: relative; }
        .slot.selected { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* メッセージ表示 */
        #msg { position: absolute; bottom: 105px; left: 10px; right: 10px; background: rgba(0,0,0,0.9); padding: 12px; border-radius: 5px; font-size: 13px; border-left: 4px solid var(--accent); opacity: 0; transition: 0.3s; z-index: 200; pointer-events: none; }

        /* 特殊画面オーバーレイ */
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 30px; cursor: pointer; }

        /* 監視カメラアニメーション */
        @keyframes sweep { 0% { transform: rotate(-45deg); } 100% { transform: rotate(45deg); } }
        .camera { transform-origin: top center; animation: sweep 3s infinite alternate ease-in-out; }
    </style>
</head>
<body>

<div id="game-view">
    <div id="header">
        <span id="location-name">Cell B201</span>
        <span id="timer">EV-LOCK: ACTIVE</span>
    </div>

    <div id="scene">
        </div>

    <div id="msg"></div>

    <div id="inventory">
        <div class="slot" id="slot-0" onclick="selectSlot(0)"></div>
        <div class="slot" id="slot-1" onclick="selectSlot(1)"></div>
        <div class="slot" id="slot-2" onclick="selectSlot(2)"></div>
        <div class="slot" id="slot-3" onclick="selectSlot(3)"></div>
        <div class="slot" id="slot-4" onclick="selectSlot(4)"></div>
    </div>

    <div id="overlay">
        <div class="close-btn" onclick="closeOverlay()">×</div>
        <div id="overlay-body"></div>
    </div>
</div>

<script>
    // --- ゲームエンジン & 状態管理 ---
    const state = {
        floor: 'B2', room: 'cell',
        inventory: [], selected: null,
        flags: {
            hasWire: false, hasDirtyLens: false, lensCleaned: false,
            powerRestored: false, evUnlocked: false, alarm: false,
            cameraActive: true, gateCodeKnown: false
        }
    };

    // --- アイテムデータ ---
    const ITEMS = {
        WIRE: { id: 'wire', name: '針金', desc: '細いが丈夫な金属。' },
        LENS: { id: 'lens', name: '汚れたレンズ', desc: '埃で何も見えない。' },
        CLEAN_LENS: { id: 'clean_lens', name: '綺麗なレンズ', desc: '光学読み取りが可能。' },
        SPIRIT: { id: 'spirit', name: '消毒液', desc: '清掃に使える。' },
        MASTER_KEY: { id: 'm_key', name: 'マスターキー', desc: '全フロア共通鍵。' }
    };

    // --- ルームデータ (B2F: 独房階, B1F: 管理階, 1F: 出口) ---
    const MAP = {
        B2: {
            cell: { 
                title: "B2F: 独房", 
                setup: () => {
                    drawObj(150, 200, 100, 50, 'rect', {fill:'#333'}, () => {
                        if(!state.flags.hasWire){ addItem(ITEMS.WIRE); msg("ベッドの裏から針金を見つけた。"); }
                    });
                    drawObj(300, 50, 40, 80, 'svg', {content:'<rect width="40" height="80" fill="#222"/><circle cx="20" cy="20" r="5" fill="red"/>'}, () => {
                        if(state.selected === 'wire'){ msg("針金で回路をショートさせた！扉が開く。"); state.flags.cellOpen = true; updateRoom(); }
                        else msg("電子ロックだ。細い道具があれば…");
                    });
                },
                nav: { e: 'hall_b2' }
            },
            hall_b2: {
                title: "B2F: 廊下",
                setup: () => {
                    drawObj(200, 150, 80, 120, 'rect', {fill:'#444'}, () => {
                        if(state.flags.evUnlocked) changeFloor('B1', 'ev_b1');
                        else msg("エレベーター。電力が来ていない。");
                    }, "ELEVATOR");
                },
                nav: { w: 'cell' }
            }
        },
        B1: {
            ev_b1: {
                title: "B1F: エレベーターホール",
                nav: { n: 'office', s: 'lab' },
                setup: () => { msg("B1Fに到着した。監視が厳しいようだ。"); }
            },
            office: {
                title: "B1F: 管理室",
                nav: { s: 'ev_b1' },
                setup: () => {
                    drawObj(100, 100, 100, 60, 'rect', {fill:'#111', stroke:'#007aff'}, () => {
                        if(state.flags.lensCleaned) {
                            msg("レンズをスキャン。正門コード[ 5792 ]を読み取った。");
                            state.flags.gateCodeKnown = true;
                        } else msg("生体認証が必要だ。");
                    }, "SCANNER");
                    if(!state.flags.hasDirtyLens) drawObj(300, 200, 40, 40, 'rect', {fill:'#555'}, () => {
                        addItem(ITEMS.LENS); state.flags.hasDirtyLens = true; updateRoom();
                    }, "LENS");
                }
            },
            lab: {
                title: "B1F: 医務室",
                nav: { n: 'ev_b1' },
                setup: () => {
                    drawObj(200, 200, 50, 80, 'svg', {content:'<rect width="50" height="80" fill="#666"/><path d="M10,20 H40" stroke="white"/>'}, () => {
                        addItem(ITEMS.SPIRIT); msg("消毒液を入手。");
                    }, "MEDS");
                }
            }
        }
    };

    // --- システム関数 ---
    function init() { updateRoom(); }

    function updateRoom() {
        const scene = document.getElementById('scene');
        scene.innerHTML = '';
        const data = MAP[state.floor][state.room];
        document.getElementById('location-name').innerText = data.title;
        
        // ナビボタン
        ['n','s','e','w'].forEach(d => {
            if(data.nav && data.nav[d]) {
                const btn = document.createElement('div');
                btn.className = `nav ${d}`;
                btn.innerHTML = d === 'n' ? '▲' : d === 's' ? '▼' : d === 'e' ? '▶' : '◀';
                btn.onclick = () => { state.room = data.nav[d]; updateRoom(); };
                scene.appendChild(btn);
            }
        });
        data.setup();
    }

    function drawObj(x, y, w, h, type, opt, click, label="") {
        const el = document.createElement('div');
        el.className = 'obj';
        el.style.left = x+'px'; el.style.top = y+'px'; el.style.width = w+'px'; el.style.height = h+'px';
        if(type === 'rect') el.style.background = opt.fill;
        if(opt.stroke) el.style.border = `2px solid ${opt.stroke}`;
        if(type === 'svg') el.innerHTML = `<svg width="100%" height="100%">${opt.content}</svg>`;
        if(label) el.innerHTML += `<div style="font-size:8px; text-align:center; margin-top:5px;">${label}</div>`;
        el.onclick = (e) => { e.stopPropagation(); click(); };
        document.getElementById('scene').appendChild(el);
    }

    function msg(t) {
        const m = document.getElementById('msg'); m.innerText = t; m.style.opacity = 1;
        setTimeout(() => m.style.opacity = 0, 3000);
    }

    function addItem(item) {
        if(state.inventory.length < 5) {
            state.inventory.push(item);
            renderInv();
        }
    }

    function renderInv() {
        for(let i=0; i<5; i++) {
            const s = document.getElementById(`slot-${i}`);
            s.innerText = state.inventory[i] ? state.inventory[i].name : '';
            s.classList.remove('selected');
            if(state.selected === (state.inventory[i] ? state.inventory[i].id : null)) s.classList.add('selected');
        }
    }

    function selectSlot(i) {
        const item = state.inventory[i];
        if(!item) return;
        
        // 合成ロジック: 消毒液を選択中にレンズをタップ
        if(state.selected === 'spirit' && item.id === 'lens') {
            state.inventory = state.inventory.filter(x => x.id !== 'lens' && x.id !== 'spirit');
            state.inventory.push(ITEMS.CLEAN_LENS);
            state.flags.lensCleaned = true;
            state.selected = null;
            msg("レンズを消毒液で拭いた。綺麗になった。");
        } else {
            state.selected = (state.selected === item.id) ? null : item.id;
        }
        renderInv();
    }

    function changeFloor(f, r) { state.floor = f; state.room = r; updateRoom(); }
    
    // エレベーターの強制復旧（B2F廊下の隠しボタンなど）
    window.addEventListener('keydown', (e) => {
        if(e.key === 'p') { state.flags.evUnlocked = true; msg("デバッグ：電力が復旧した。"); updateRoom(); }
    });

    init();
</script>
</body>
</html>
