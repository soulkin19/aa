<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PRISON ESCAPE</title>
    <style>
        :root {
            --bg-dark: #121212; --led-red: #ff3b30; --led-green: #4cd964; --led-blue: #007aff;
            --terminal-green: #33ff33;
        }
        body { 
            margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; color: #eee; 
            /* touch-action: none; を削除することでピンチ操作を許可 */
            overflow-x: hidden; 
            user-select: none; -webkit-user-select: none;
        }
        
        /* 以下、ゲームのレイアウト維持のための最小限の構成 */
        #game-view { 
            width: 100vw; height: 100vh; max-width: 500px; margin: 0 auto; 
            display: flex; flex-direction: column; position: relative; 
            border-left: 2px solid #333; border-right: 2px solid #333; 
            overflow: hidden; 
        }
        
        #viewport { flex: 1; position: relative; overflow: hidden; background: #000; }
        .scene { position: absolute; inset: 0; transition: transform 0.4s ease-in-out; }

        /* ナビゲーションやインベントリなどは前回のまま */
        .nav-btn { 
            position: absolute; width: 60px; height: 60px; background: rgba(255,255,255,0.1); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 30px; color: white; z-index: 120; border: 1px solid rgba(255,255,255,0.3);
        }
        .nav-n { top: 80px; left: calc(50% - 30px); }
        /* ...その他のボタン配置... */

        #inventory { height: 90px; background: #1a1a1a; display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; padding: 10px; border-top: 2px solid #444; }
        .slot { height: 70px; background: #2c2c2e; border: 2px solid #555; border-radius: 6px; }
        
        .obj { position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="game-view">
    <div id="viewport">
        <div id="scene-a" class="scene" style="background: #2c2c2e;">
            <div class="obj" style="left:100px; top:100px; width:100px; height:100px; background:red;" onclick="alert('Touched')">TARGET</div>
        </div>
    </div>
    
    <div id="inventory">
        <div class="slot"></div><div class="slot"></div><div class="slot"></div>
        <div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>
</div>

<script>
    // ピンチ操作時でもJavaScriptのイベントがバッティングしないよう、
    // 必要最小限のイベント処理にしています。
    document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) {
            // 2本指以上の操作（ピンチ）はブラウザのデフォルト挙動に任せる
        }
    }, { passive: true });
</script>

</body>
</html>
