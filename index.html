<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Survivor: Lone Defender</title>
    <style>
        * { touch-action: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #2c3e50; font-family: 'Arial Black', sans-serif; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; background-color: #eddfb3; }
        
        #setup { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; padding: 20px; text-align: center; }
        .btn { padding: 12px 20px; margin: 8px; font-size: 14px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; transition: 0.2s; }
        .selected { border: 4px solid #f1c40f !important; box-shadow: 0 0 15px #f1c40f; }
        .opt-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .sys-btn { background: #34495e; color: white; width: 160px; text-align: left; }
        .sys-btn small { font-weight: normal; font-size: 10px; display: block; opacity: 0.8; }
        .label { font-size: 12px; color: #f1c40f; margin-bottom: 5px; text-transform: uppercase; }

        #ui { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.85); padding: 10px; border-radius: 8px; border: 2px solid #555; min-width: 170px; pointer-events: none; z-index: 10; }
        .bar-bg { width: 100%; height: 6px; background: #ccc; margin-top: 4px; border-radius: 3px; overflow: hidden; }
        #gadget-bar { width: 0%; height: 100%; background: #8e44ad; }
        #defense-bar { width: 0%; height: 100%; background: #2980b9; }

        #score-indicator { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #f1c40f; padding: 5px 20px; border-radius: 20px; font-size: 18px; z-index: 50; border: 1px solid #f1c40f; }

        #mobile-controls { display: none; position: absolute; inset: 0; pointer-events: none; z-index: 20; }
        #stick-area { position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; border: 2px solid rgba(255,255,255,0.2); }
        #stick { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; background: rgba(255,255,255,0.6); border-radius: 50%; transform: translate(-50%, -50%); }
        .action-btn { position: absolute; width: 70px; height: 70px; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; pointer-events: auto; font-size: 12px; border: 2px solid #fff; }
        #btn-fire { bottom: 130px; right: 40px; width: 90px; height: 90px; background: rgba(192, 57, 43, 0.7); font-size: 18px; }
        #btn-gadget { bottom: 50px; right: 140px; background: rgba(142, 68, 173, 0.7); }
        #btn-def { bottom: 50px; right: 40px; background: rgba(41, 128, 185, 0.7); }
        .ammo-selector { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .ammo-btn { width: 45px; height: 45px; background: rgba(0,0,0,0.6); color: #fff; border: 2px solid #f1c40f; border-radius: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color:#f1c40f;">TANK SURVIVOR</h1>
        <p style="color:#bbb;">迫りくる敵軍を撃破し、生き残れ</p>
        
        <div class="label">戦車タイプ選択</div>
        <div class="opt-group">
            <button id="type-heavy" class="btn sys-btn">重戦車<small>HP:180 / 高火力 / 低速</small></button>
            <button id="type-medium" class="btn sys-btn selected">中戦車<small>HP:100 / 標準</small></button>
            <button id="type-light" class="btn sys-btn">軽戦車<small>HP:60 / 紙装甲 / 高速</small></button>
        </div>

        <div class="label">主砲ロードアウト (3つ選択)</div>
        <div class="opt-group" id="loadout-container"></div>

        <div class="label">特殊武装 [Q]</div>
        <div class="opt-group">
            <button id="def-1" class="btn sys-btn selected">AT4<small>対戦車誘導弾</small></button>
            <button id="def-6" class="btn sys-btn">ADS防御<small>弾撃墜システム</small></button>
            <button id="def-4" class="btn sys-btn">近接信管弾<small>面制圧</small></button>
        </div>

        <button id="start-game" class="btn" style="background:#f1c40f; color:#000; width:300px; font-size:20px; margin-top:20px; opacity: 0.5;">SELECT 3 AMMO</button>
    </div>

    <div id="score-indicator">KILLS: <span id="score">0</span></div>

    <div id="ui">
        <div id="hpDisplay" style="font-size:18px; font-weight:bold;">HP: 100</div>
        <div id="weaponDisplay" style="font-size:13px; color:#e67e22;">HE</div>
        <div style="font-size:11px; margin-top:5px;">修理ナノマシン [R]</div>
        <div class="bar-bg"><div id="gadget-bar"></div></div>
        <div style="font-size:11px; margin-top:5px;">特殊武装 [Q]</div>
        <div class="bar-bg"><div id="defense-bar"></div></div>
    </div>

    <div id="mobile-controls">
        <div id="stick-area"><div id="stick"></div></div>
        <div id="btn-fire" class="action-btn">FIRE</div>
        <div id="btn-gadget" class="action-btn">R</div>
        <div id="btn-def" class="action-btn">Q</div>
        <div class="ammo-selector" id="ammo-list"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const worldWidth = 2500, worldHeight = 2500;

        const tankSpecs = {
            'heavy':  { hp: 180, maxHp: 180, speed: 1.8, powerMult: 1.6, reloadMult: 1.4, size: 1.1, color: '#1a2a1a' },
            'medium': { hp: 100, maxHp: 100, speed: 2.8, powerMult: 1.0, reloadMult: 1.0, size: 1.0, color: '#2d5a27' },
            'light':  { hp: 60,  maxHp: 60,  speed: 4.8, powerMult: 0.6, reloadMult: 0.7, size: 0.9, color: '#4a7c44' },
            'enemy':  { hp: 40,  maxHp: 40,  speed: 2.0, powerMult: 0.8, reloadMult: 2.0, size: 0.9, color: '#c0392b' }
        };

        const ammoTypes = {
            '1': { name: "HE", power: 15, reload: 30, speed: 12, color: "#e67e22", isExplosive: true },
            '2': { name: "AP", power: 25, reload: 40, bounce: true, speed: 16, color: "#34495e" },
            '3': { name: "APFSDS", power: 45, reload: 80, speed: 50, color: "#2c3e50" },
            '4': { name: "HESH", power: 30, reload: 60, speed: 11, color: "#9b59b6", isExplosive: true, bigExplosion: true },
            '5': { name: "FS", power: 5, reload: 50, speed: 18, color: "#7f8c8d", isFlechette: true },
            '6': { name: "APHE", power: 35, reload: 60, speed: 20, color: "#e74c3c", isExplosive: true },
            '7': { name: "HEAT", power: 28, reload: 50, speed: 14, color: "#d35400", isExplosive: true }
        };

        const player = {
            x: worldWidth/2, y: worldHeight/2, angle: 0, turretAngle: 0, vx: 0, vy: 0, hp: 100, maxHp: 100,
            reloading: 0, currentAmmo: '1', gadgetCD: 0, defenseCD: 0, adsActive: 0,
            repairPool: 0, shake: 0, selectedAmmo: [], kills: 0, type: 'medium', defense: 1
        };

        let enemies = [];
        let shells = [];
        let explosions = [];
        let keys = {};
        let isMobileMode = false;
        let spawnTimer = 0;

        const walls = [
            {x: 0, y: 0, w: worldWidth, h: 40}, {x: 0, y: worldHeight-40, w: worldWidth, h: 40},
            {x: 0, y: 0, w: 40, h: worldHeight}, {x: worldWidth-40, y: 0, w: 40, h: worldHeight},
            {x: 600, y: 600, w: 300, h: 300}, {x: 1600, y: 600, w: 300, h: 300},
            {x: 600, y: 1600, w: 300, h: 300}, {x: 1600, y: 1600, w: 300, h: 300},
            {x: worldWidth/2-50, y: 1000, w: 100, h: 500}
        ];

        // UI Setup
        const loadoutContainer = document.getElementById('loadout-container');
        Object.keys(ammoTypes).forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'btn sys-btn';
            btn.style.width = "100px";
            btn.innerHTML = `${ammoTypes[key].name}`;
            btn.onclick = () => {
                const idx = player.selectedAmmo.indexOf(key);
                if (idx > -1) { player.selectedAmmo.splice(idx, 1); btn.classList.remove('selected'); }
                else if (player.selectedAmmo.length < 3) { player.selectedAmmo.push(key); btn.classList.add('selected'); }
                updateStartButton();
            };
            loadoutContainer.appendChild(btn);
        });

        function updateStartButton() {
            const startBtn = document.getElementById('start-game');
            if (player.selectedAmmo.length === 3) { startBtn.style.opacity = "1"; startBtn.innerText = "BATTLE START"; }
            else { startBtn.style.opacity = "0.5"; startBtn.innerText = `SELECT ${3-player.selectedAmmo.length} AMMO`; }
        }

        // Controls
        let stickData = { active: false, x: 0, y: 0 };
        const stickEl = document.getElementById('stick'), stickArea = document.getElementById('stick-area');
        stickArea.addEventListener('touchstart', (e) => { stickData.active = true; handleStick(e); });
        stickArea.addEventListener('touchmove', (e) => { if(stickData.active) { e.preventDefault(); handleStick(e); } }, {passive:false});
        stickArea.addEventListener('touchend', () => { stickData.active = false; stickData.x = 0; stickData.y = 0; stickEl.style.transform = `translate(-50%, -50%)`; });

        function handleStick(e) {
            const touch = e.touches[0], rect = stickArea.getBoundingClientRect();
            const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
            const dx = touch.clientX - cx, dy = touch.clientY - cy;
            const dist = Math.min(60, Math.hypot(dx, dy)), angle = Math.atan2(dy, dx);
            stickData.x = (Math.cos(angle) * dist) / 60; stickData.y = (Math.sin(angle) * dist) / 60;
            stickEl.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
        }

        document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); keys[' '] = true; });
        document.getElementById('btn-fire').addEventListener('touchend', () => keys[' '] = false);
        document.getElementById('btn-gadget').addEventListener('touchstart', (e) => { e.preventDefault(); useGadget(); });
        document.getElementById('btn-def').addEventListener('touchstart', (e) => { e.preventDefault(); useDefense(); });

        window.onkeydown = (e) => { 
            keys[e.key] = true; 
            if(['1','2','3'].includes(e.key)) player.currentAmmo = player.selectedAmmo[parseInt(e.key)-1] || player.currentAmmo;
            if(e.key.toLowerCase()==='r') useGadget();
            if(e.key.toLowerCase()==='q') useDefense();
        };
        window.onkeyup = (e) => keys[e.key] = false;

        function isPointInWall(x, y, p = 25) {
            return walls.some(w => x+p > w.x && x-p < w.x+w.w && y+p > w.y && y-p < w.y+w.h);
        }

        function spawnEnemy() {
            const side = Math.floor(Math.random() * 4);
            let ex, ey;
            if(side === 0) { ex = Math.random()*worldWidth; ey = 60; }
            else if(side === 1) { ex = Math.random()*worldWidth; ey = worldHeight-60; }
            else if(side === 2) { ex = 60; ey = Math.random()*worldHeight; }
            else { ex = worldWidth-60; ey = Math.random()*worldHeight; }

            enemies.push({
                x: ex, y: ey, angle: 0, turretAngle: 0, hp: 40, maxHp: 40, 
                reloading: 100, type: 'enemy', vx: 0, vy: 0
            });
        }

        function useGadget() {
            if(player.gadgetCD > 0) return;
            player.repairPool = 40; player.gadgetCD = 800;
        }

        function useDefense() {
            if(player.defenseCD > 0) return;
            const t = player.turretAngle;
            if(player.defense === 1) {
                fireShellLogic(player.x, player.y, t, {speed:7, power:50, color:"#c0392b", isExplosive:true, isMissile:true}, true);
                player.defenseCD = 300;
            } else if(player.defense === 6) {
                player.adsActive = 300; player.defenseCD = 800;
            } else if
