<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>花粉症サバイバル</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #eef9ff; /* 春っぽい空色 */
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: none; /* スマホのスクロール防止 */
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            user-select: none;
        }
        .label {
            font-size: 18px;
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }
        #gauge-container {
            width: 200px;
            height: 20px;
            background: #ccc;
            border-radius: 10px;
            overflow: hidden;
        }
        #gauge {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffeb3b, #f44336);
            transition: width 0.1s;
        }
        #score {
            font-size: 24px;
            color: #333;
            margin-top: 10px;
        }
        #msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="label">くしゃみゲージ</div>
        <div id="gauge-container"><div id="gauge"></div></div>
        <div id="score">Score: 0</div>
    </div>

    <div id="msg">
        <h1 id="status-text">Game Over!</h1>
        <p id="final-score"></p>
        <button onclick="resetGame()">再挑戦</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gauge = document.getElementById('gauge');
    const scoreElement = document.getElementById('score');
    const msgBox = document.getElementById('msg');
    const finalScoreElement = document.getElementById('final-score');

    let player, pollens, masks, score, sneezeLevel, gameActive;
    let pointer = { x: 0, y: 0 };

    // 初期化
    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player = { x: canvas.width / 2, y: canvas.height / 2, r: 20 };
        pollens = [];
        masks = [];
        score = 0;
        sneezeLevel = 0;
        gameActive = true;
        msgBox.style.display = 'none';
        pointer.x = player.x;
        pointer.y = player.y;
    }

    // 入力設定
    window.addEventListener('mousemove', e => { pointer.x = e.clientX; pointer.y = e.clientY; });
    window.addEventListener('touchmove', e => {
        pointer.x = e.touches[0].clientX;
        pointer.y = e.touches[0].clientY;
    }, { passive: false });

    function spawnPollen() {
        if (pollens.length < 50 + score / 100) {
            pollens.push({
                x: Math.random() * canvas.width,
                y: -20,
                vx: (Math.random() - 0.5) * 2,
                vy: 2 + Math.random() * 3,
                r: 5 + Math.random() * 5
            });
        }
    }

    function spawnMask() {
        if (Math.random() < 0.01) {
            masks.push({
                x: Math.random() * canvas.width,
                y: -30,
                r: 15
            });
        }
    }

    function update() {
        if (!gameActive) return;

        // 自機の追従
        player.x += (pointer.x - player.x) * 0.15;
        player.y += (pointer.y - player.y) * 0.15;

        // 花粉の移動と判定
        pollens.forEach((p, i) => {
            p.y += p.vy;
            p.x += Math.sin(p.y / 20) * 2; // ふわふわさせる

            const dist = Math.hypot(player.x - p.x, player.y - p.y);
            if (dist < player.r + p.r) {
                sneezeLevel += 5;
                pollens.splice(i, 1);
            }
            if (p.y > canvas.height + 20) pollens.splice(i, 1);
        });

        // マスクの移動と判定
        masks.forEach((m, i) => {
            m.y += 2;
            const dist = Math.hypot(player.x - m.x, player.y - m.y);
            if (dist < player.r + m.r) {
                sneezeLevel = Math.max(0, sneezeLevel - 30);
                masks.splice(i, 1);
            }
            if (m.y > canvas.height + 30) masks.splice(i, 1);
        });

        sneezeLevel += 0.05; // 自然増
        score++;

        // UI更新
        gauge.style.width = sneezeLevel + '%';
        scoreElement.innerText = `Score: ${Math.floor(score / 10)}`;

        if (sneezeLevel >= 100) gameOver();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // マスク描画
        masks.forEach(m => {
            ctx.fillStyle = '#fff';
            ctx.fillRect(m.x - 15, m.y - 10, 30, 20);
            ctx.strokeStyle = '#999';
            ctx.strokeRect(m.x - 15, m.y - 10, 30, 20);
            ctx.beginPath();
            ctx.moveTo(m.x - 15, m.y); ctx.lineTo(m.x - 25, m.y - 5);
            ctx.moveTo(m.x + 15, m.y); ctx.lineTo(m.x + 25, m.y - 5);
            ctx.stroke();
        });

        // 自機（人間）描画
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
        ctx.fillStyle = '#ffdbac'; // 肌色
        ctx.fill();
        ctx.stroke();
        // 目
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.arc(player.x - 7, player.y - 5, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(player.x + 7, player.y - 5, 2, 0, Math.PI * 2); ctx.fill();
        // 口（ダメージで変わる）
        ctx.strokeStyle = '#333';
        ctx.beginPath();
        if(sneezeLevel < 70) ctx.arc(player.x, player.y + 5, 5, 0, Math.PI);
        else ctx.arc(player.x, player.y + 10, 5, Math.PI, 0); // への字
        ctx.stroke();

        // 花粉描画
        pollens.forEach(p => {
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
            // 花粉のトゲ
            for(let j=0; j<8; j++){
                let ang = j * (Math.PI/4);
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x + Math.cos(ang)*(p.r+3), p.y + Math.sin(ang)*(p.r+3));
            }
            ctx.strokeStyle = '#daa520';
            ctx.stroke();
        });
    }

    function loop() {
        update();
        draw();
        spawnPollen();
        spawnMask();
        if (gameActive) requestAnimationFrame(loop);
    }

    function gameOver() {
        gameActive = false;
        msgBox.style.display = 'block';
        finalScoreElement.innerText = `最終スコア: ${Math.floor(score / 10)}`;
    }

    function resetGame() {
        init();
        loop();
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    init();
    loop();
</script>
</body>
</html>
