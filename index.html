<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRISON ESCAPE</title>
    <style>
        :root {
            --bg-dark: #121212; --led-red: #ff3b30; --led-green: #4cd964; --led-blue: #007aff;
            --terminal-green: #33ff33;
        }
        body { margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; color: #eee; overflow: hidden; user-select: none; touch-action: manipulation; }
        #game-view { width: 100vw; height: 100vh; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; position: relative; border-left: 2px solid #333; border-right: 2px solid #333; }
        #scene { flex: 1; position: relative; background: #1a1a1a; overflow: hidden; transition: 0.5s; }
        #room-title { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 4px; font-size: 14px; z-index: 50; border-left: 2px solid var(--led-blue); }
        
        #timer-display { position: absolute; top: 10px; right: 10px; background: rgba(180, 0, 0, 0.8); padding: 5px 10px; border-radius: 4px; font-size: 16px; font-weight: bold; color: white; z-index: 200; display: none; border: 1px solid #ff0000; box-shadow: 0 0 10px red; }

        #inventory { height: 85px; background: #1a1a1a; display: flex; gap: 8px; padding: 10px; border-top: 2px solid #444; }
        .slot { flex: 1; height: 65px; background: #2c2c2e; border: 2px solid #555; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center; cursor: pointer; color: #aaa; overflow: hidden; }
        .slot.selected { border-color: var(--led-blue); box-shadow: 0 0 10px var(--led-blue); background: #3a3a3c; color: #fff; }

        #msg { position: absolute; bottom: 110px; left: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 8px; font-size: 13px; border-left: 4px solid var(--led-blue); opacity: 0; transition: 0.3s; z-index: 100; pointer-events: none; white-space: pre-wrap; }

        .nav-btn { position: absolute; width: 55px; height: 55px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; z-index: 60; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px); }
        .nav-n { top: 70px; left: calc(50% - 27px); }
        .nav-s { bottom: 25px; left: calc(50% - 27px); }
        .nav-e { top: calc(50% - 27px); right: 15px; }
        .nav-w { top: calc(50% - 27px); left: 15px; }

        .obj { position: absolute; cursor: pointer; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .close-overlay { position: absolute; top: 20px; right: 20px; font-size: 35px; cursor: pointer; }

        .keypad { display: grid; grid-template-columns: repeat(3, 65px); gap: 12px; }
        .key { width: 65px; height: 65px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 22px; border-radius: 10px; border: 1px solid #555; }
        .display { width: 220px; height: 55px; background: #000; color: var(--led-green); text-align: center; line-height: 55px; font-size: 26px; margin-bottom: 25px; border: 2px solid #444; }

        #terminal-screen { width: 90%; height: 70%; background: #050505; color: var(--terminal-green); padding: 15px; font-size: 14px; border: 2px solid #333; }
        .laser { position: absolute; background: rgba(255, 0, 0, 0.7); box-shadow: 0 0 10px red; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-view">
    <div id="scene"></div>
    <div id="timer-display">TIME: 15s</div>
    <div id="nav-n" class="nav-btn nav-n">▲</div>
    <div id="nav-s" class="nav-btn nav-s">▼</div>
    <div id="nav-e" class="nav-btn nav-e">▶</div>
    <div id="nav-w" class="nav-btn nav-w">◀</div>
    <div id="msg"></div>
    <div id="inventory">
        <div class="slot" id="slot-0" onclick="selectItem(0)"></div>
        <div class="slot" id="slot-1" onclick="selectItem(1)"></div>
        <div class="slot" id="slot-2" onclick="selectItem(2)"></div>
        <div class="slot" id="slot-3" onclick="selectItem(3)"></div>
    </div>
    <div id="overlay">
        <div class="close-overlay" onclick="closeOverlay()">×</div>
        <div id="overlay-content"></div>
    </div>
</div>

<script>
    const state = {
        currentRoom: 'cell', inventory: [], selectedItem: null,
        cellCode: "", pcPass: "", laserSequence: [], laserInput: [],
        cellDoorOpen: false, hasSpoon: false, wallScraped: false,
        hasSilverKey: false, hasStaffCard: false, wardPowerOn: false,
        mainGateOpen: false, alarmTriggered: false, alarmSeconds: 15,
        hasFlashlight: false, laserActive: true, gameEnded: false
    };

    const items = {
        spoon: { id: 'spoon', name: 'スプーン' },
        note: { id: 'note', name: '汚れた紙片' },
        sKey: { id: 'skey', name: '銀の鍵' },
        card: { id: 'card', name: '職員ID証' },
        rKey: { id: 'rkey', name: '錆びた鍵' },
        torch: { id: 'torch', name: 'ペンライト' }
    };

    function initRandom() {
        state.cellCode = Math.floor(1000 + Math.random() * 9000).toString();
        const words = ["dark", "cold", "exit", "free", "fear", "hope", "evil", "jail"];
        state.pcPass = words[Math.floor(Math.random() * words.length)];
        const colors = ["cyan", "magenta", "yellow"];
        state.laserSequence = [...colors].sort(() => Math.random() - 0.5);
    }

    const rooms = {
        cell: {
            title: "独房 #101", bg: "linear-gradient(#2c2c2e, #000)", nav: {},
            setup: (c) => {
                addSvgObj(c, 'crack', 100, 100, 120, 120, '<path d="M10,60 Q30,20 60,60 T110,60" stroke="#111" fill="none" stroke-width="3"/>', tapWall);
                addSvgObj(c, 'bed', 20, 320, 220, 100, '<rect x="0" y="20" width="200" height="60" rx="5" fill="#222"/><rect x="10" y="10" width="60" height="30" rx="2" fill="#333"/>', tapBed);
                addSvgObj(c, 'door', 320, 50, 150, 400, '<rect x="0" y="0" width="10" height="400" fill="#444"/><rect x="40" y="0" width="10" height="400" fill="#444"/><rect x="80" y="0" width="10" height="400" fill="#444"/><rect x="0" y="150" width="120" height="15" fill="#333"/>', tapCellDoor);
                const pColor = state.cellDoorOpen ? 'var(--led-green)' : 'var(--led-red)';
                addDivObj(c, 270, 200, 40, 60, 'background:#111; border:2px solid #333;', openKeypad);
                addDivObj(c, 285, 210, 10, 10, `background:${pColor}; border-radius:50%; box-shadow:0 0 5px ${pColor};`);
            }
        },
        ward: {
            title: "隔離病棟廊下", bg: "#151515", nav: { n: 'library', s: 'cafeteria', w: 'security' },
            setup: (c) => { addDivObj(c, 180, 240, 140, 50, 'color:#2a2a2a; font-size:30px; font-weight:bold;', null, "W-01"); }
        },
        library: {
            title: "図書室", bg: "#1a120b", nav: { s: 'ward' },
            setup: (c) => {
                addDivObj(c, 50, 100, 150, 250, 'background:#3d2b1f; border:2px solid #5d4037;', () => showMsg("本がぎっしり詰まっている。"), "本棚");
                addDivObj(c, 300, 120, 120, 180, 'background:#eee; color:#000; font-size:10px; padding:8px; transform:rotate(2deg);', null, `重要：\nPCパスワードは\n「${state.pcPass.split('').reverse().join('')}」の\n逆読みである。`);
            }
        },
        security: {
            title: "セキュリティルーム", bg: "#1a1a2e", nav: { e: 'ward' },
            setup: (c) => {
                if(!state.hasStaffCard) addDivObj(c, 220, 230, 60, 40, 'background:#fff; color:#000; font-size:8px; border-radius:3px;', tapIdCard, "ID:1004");
            }
        },
        cafeteria: {
            title: "中央食堂", bg: "#1a1a1a", nav: { n: 'ward', s: 'kitchen', e: 'infirmary', w: 'corridor' },
            setup: (c) => { 
                addDivObj(c, 100, 220, 300, 80, 'background:#333; border-radius:5px;', null, "TABLE"); 
                // 北ボタンの上書きロジックは updateNavButtons で行う
            }
        },
        kitchen: {
            title: "厨房", bg: "#222", nav: { n: 'cafeteria' },
            setup: (c) => {
                if(!state.hasSilverKey) addSvgObj(c, 'key', 350, 320, 40, 40, '<circle cx="20" cy="15" r="10" fill="none" stroke="#aaa" stroke-width="3"/><rect x="18" y="25" width="4" height="15" fill="#aaa"/>', tapSilverKey);
                addDivObj(c, 50, 150, 120, 180, 'background:#444;', () => showMsg("空っぽの冷蔵庫だ。"), "FRIDGE");
            }
        },
        infirmary: {
            title: "医務室", bg: "#202a20", nav: { w: 'cafeteria', e: 'hidden' },
            setup: (c) => {
                addDivObj(c, 350, 100, 100, 200, 'background:#444; border:1px solid #555;', tapCabinet, "薬品棚");
            }
        },
        hidden: {
            title: "隠し部屋", bg: "#050505", nav: { w: 'infirmary' },
            setup: (c) => {
                const it = getSelectedItem();
                if(it && it.id === 'torch') {
                    addDivObj(c, 100, 150, 300, 100, 'color:#0f0; text-shadow:0 0 8px #0f0; font-size:18px;', null, `LASER ORDER:\n${state.laserSequence.join(' > ').toUpperCase()}`);
                }
                addSvgObj(c, 'lever', 30, 250, 60, 100, '<rect x="25" y="0" width="10" height="100" fill="#444"/><circle cx="30" cy="0" r="15" fill="#666"/>', () => { showMsg("レバーを引いた。ドアの電子ロックが解除された。"); changeRoom('hidden'); });
                if(state.alarmTriggered && state.alarmSeconds <= 0) showMsg("（外から看守の足音が聞こえる...）\nカツン... カツン...");
            }
        },
        duty: {
            title: "看守詰所", bg: "#2c2c2e", nav: { s: 'cafeteria' },
            setup: (c) => {
                addSvgObj(c, 'pc', 160, 180, 180, 120, '<rect x="0" y="0" width="180" height="110" rx="5" fill="#555"/><rect x="10" y="10" width="160" height="90" fill="#000"/>', openPc);
                const bColor = state.wardPowerOn ? 'var(--led-green)' : 'var(--led-red)';
                addDivObj(c, 400, 100, 60, 100, `background:#333; border:2px solid ${bColor};`, tapBreaker, "POWER");
                if(!state.hasRustyKey) addDivObj(c, 50, 120, 80, 240, 'background:#3a3a3c;', tapLocker, "LOCKER");
            }
        },
        corridor: {
            title: "連絡通路", bg: "#050505", nav: { e: 'cafeteria' },
            setup: (c) => {
                if(state.laserActive) {
                    for(let i=0; i<6; i++) {
                        const l = document.createElement('div'); l.className = 'laser';
                        l.style.cssText = `left:0; top:${100 + i*60}px; width:100%; height:2px;`; c.appendChild(l);
                    }
                    addDivObj(c, 440, 220, 50, 80, 'background:#222; border:2px solid #555;', openLaserPanel, "LOCK");
                } else {
                    updateNavButtons({ e: 'cafeteria', w: 'maingate' });
                    addDivObj(c, 100, 200, 300, 50, 'color:var(--led-green);', null, "SYSTEM OFFLINE");
                }
            }
        },
        maingate: {
            title: "施設正門", bg: "#000", nav: { e: 'corridor' },
            setup: (c) => {
                addDivObj(c, 50, 50, 400, 400, 'border:10px double #222;', null, "GATE");
                addDivObj(c, 430, 220, 30, 60, 'background:#111; border:2px solid var(--led-blue);', tapKeyhole, "KEY");
            }
        }
    };

    function updateNavButtons(nav) {
        ['n', 's', 'e', 'w'].forEach(d => {
            const b = document.getElementById(`nav-${d}`);
            let target = nav[d];
            
            // 食堂（cafeteria）から北（n）へ行く時の特別ルール
            if(state.currentRoom === 'cafeteria' && d === 'n') {
                const it = getSelectedItem();
                if(it && it.id === 'card') {
                    target = 'duty'; // IDカードを持っていれば詰所へ
                } else {
                    target = 'ward'; // 持っていなければ廊下へ
                }
            }

            if(target) {
                b.style.display = 'flex';
                b.onclick = () => {
                    if(state.currentRoom === 'cafeteria' && d === 'n' && target === 'duty') {
                        showMsg("IDカードでセキュリティを突破した。");
                    }
                    changeRoom(target);
                };
            } else {
                b.style.display = 'none';
            }
        });
    }

    function changeRoom(id) {
        if(id === 'security' && !state.hasSilverKey) { showMsg("ドアが施錠されている。銀の鍵が必要だ。"); return; }
        // 詰所への直接チェックは updateNavButtons に統合したが念のため
        if(id === 'duty' && (!getSelectedItem() || getSelectedItem().id !== 'card')) {
            showMsg("職員ID証をアイテム欄で「選択」してから進め。");
            return;
        }
        
        state.currentRoom = id; const r = rooms[id]; const s = document.getElementById('scene');
        s.innerHTML = `<div id="room-title">${r.title}</div>`; s.style.background = r.bg;
        r.setup(s); updateNavButtons(r.nav);
    }

    function addDivObj(c, x, y, w, h, css, act, text='') {
        const e = document.createElement('div'); e.className = act ? 'obj' : '';
        e.style.cssText = `position:absolute; left:${x}px; top:${y}px; width:${w}px; height:${h}px; z-index:10; display:flex; align-items:center; justify-content:center; text-align:center; cursor:pointer; font-size:12px; ${css}`;
        if(act) e.onclick = act; e.innerText = text; c.appendChild(e);
    }

    function addSvgObj(c, id, x, y, w, h, svg, act) {
        const e = document.createElement('div'); e.className = 'obj'; e.style.cssText = `position:absolute; left:${x}px; top:${y}px; width:${w}px; height:${h}px; z-index:10;`;
        if(act) e.onclick = act; e.innerHTML = `<svg viewBox="0 0 ${w} ${h}" width="100%" height="100%">${svg}</svg>`;
        c.appendChild(e);
    }

    function showMsg(t) {
        const m = document.getElementById('msg'); m.innerText = t; m.style.opacity = 1;
        clearTimeout(state.msgTimer); state.msgTimer = setTimeout(() => m.style.opacity = 0, 4000);
    }

    // ギミック系
    let inputCode = "";
    function openKeypad() {
        if(state.cellDoorOpen) return;
        let h = `<div class="display" id="code-disp">----</div><div class="keypad">`;
        for(let i=1; i<=9; i++) h += `<div class="key" onclick="pressKey('${i}')">${i}</div>`;
        h += `<div class="key" onclick="pressKey('0')">0</div><div class="key" style="background:#444" onclick="inputCode=''">C</div><div class="key" style="background:var(--led-green)" onclick="checkCode()">OK</div></div>`;
        openOverlay(h);
    }
    function pressKey(n) { if(inputCode.length < 4) { inputCode += n; document.getElementById('code-disp').innerText = inputCode.padEnd(4, '-'); } }
    function checkCode() {
        if(inputCode === state.cellCode) { state.cellDoorOpen = true; closeOverlay(); changeRoom('cell'); showMsg("ロック解除。"); }
        else { showMsg("コードが違う。"); inputCode = ""; document.getElementById('code-disp').innerText = "----"; }
    }

    function openPc() {
        if(!state.wardPowerOn) { showMsg("電力が供給されていない。"); return; }
        openOverlay(`<div id="terminal-screen"><div id="t-out">LOGIN STAFF ID:</div><input type="text" id="t-in" style="background:none; border:none; color:var(--terminal-green); outline:none; width:100%; font-size:20px;" onkeydown="handlePC(event)" autofocus></div>`);
    }
    function handlePC(e) {
        if(e.key !== 'Enter') return;
        const val = e.target.value.toLowerCase().trim(); const out = document.getElementById('t-out');
        if(val === "1004") { out.innerText += `\n${val}\nACCESS GRANTED.\nENTER PASSWORD:`; e.target.value = ""; }
        else if(val === state.pcPass) { out.innerText += `\nSuccess.\n[1] OPEN MAIN GATE\n[2] EXIT`; e.target.value = ""; }
        else if(val === "1") { state.mainGateOpen = true; out.innerText += `\nGATE UNLOCKED.`; showMsg("正門のロックを遠隔解除した！"); }
        else { out.innerText = "INVALID INPUT."; e.target.value = ""; }
    }

    function openLaserPanel() {
        let h = `<div style="margin-bottom:20px;">SECURITY SEQUENCE</div><div style="display:flex; gap:10px;">`;
        ["cyan", "magenta", "yellow"].forEach(c => h += `<div style="width:70px; height:70px; background:${c};" onclick="tapLaserColor('${c}')"></div>`);
        h += `</div><div id="l-status" style="margin-top:20px;">INPUT...</div>`;
        openOverlay(h); state.laserInput = [];
    }
    function tapLaserColor(c) {
        state.laserInput.push(c); document.getElementById('l-status').innerText = `INPUT: ${state.laserInput.length}/3`;
        if(state.laserInput.length === 3) {
            if(JSON.stringify(state.laserInput) === JSON.stringify(state.laserSequence)) {
                state.laserActive = false; closeOverlay(); changeRoom('corridor'); showMsg("レーザーを無効化した。");
            } else { showMsg("警報！"); triggerAlarm(); closeOverlay(); }
        }
    }

    function triggerAlarm() {
        if(state.alarmTriggered) return; state.alarmTriggered = true;
        document.getElementById('timer-display').style.display = 'block';
        const timer = setInterval(() => {
            state.alarmSeconds--; document.getElementById('timer-display').innerText = `CAUGHT IN: ${state.alarmSeconds}s`;
            if(state.alarmSeconds <= 0) {
                clearInterval(timer);
                if(state.currentRoom !== 'hidden' && !state.gameEnded) triggerEnd();
                else if(state.currentRoom === 'hidden') {
                    document.getElementById('timer-display').style.display = 'none';
                    showMsg("看守たちは去ったようだ。"); changeRoom('hidden');
                }
            }
        }, 1000);
    }

    function tapWall() { if(getSelectedItem()?.id === 'spoon' && !state.wallScraped) { state.inventory.push(items.note); state.wallScraped = true; updateInventoryUI(); showMsg("「汚れた紙片」を入手。"); } else showMsg("壁は頑丈だ。"); }
    function tapBed() { if(!state.hasSpoon) { state.hasSpoon = true; state.inventory.push(items.spoon); updateInventoryUI(); showMsg("「スプーン」を入手。"); } }
    function tapCellDoor() { if(state.cellDoorOpen) changeRoom('ward'); else showMsg("パネルにコードを入力しろ。"); }
    function tapSilverKey() { state.hasSilverKey = true; state.inventory.push(items.sKey); updateInventoryUI(); changeRoom('kitchen'); showMsg("「銀の鍵」を入手。"); }
    function tapIdCard() { state.hasStaffCard = true; state.inventory.push(items.card); updateInventoryUI(); changeRoom('security'); showMsg("「職員ID証」を入手。これで詰所に入れる。"); }
    function tapCabinet() { if(!state.hasFlashlight) { state.hasFlashlight = true; state.inventory.push(items.torch); updateInventoryUI(); showMsg("「ペンライト」を入手。"); } }
    function tapBreaker() { state.wardPowerOn = true; changeRoom('duty'); showMsg("電力が復旧した！"); }
    function tapLocker() { if(!state.hasRustyKey) { state.hasRustyKey = true; state.inventory.push(items.rKey); updateInventoryUI(); triggerAlarm(); showMsg("「錆びた鍵」入手！警報が鳴った！隠れろ！"); } }
    function tapKeyhole() { if(state.mainGateOpen && getSelectedItem()?.id === 'rkey') triggerWin(); else showMsg("ゲートが開かない。"); }

    function selectItem(i) {
        if(state.inventory[i]) {
            state.selectedItem = (state.selectedItem === i) ? null : i;
            if(state.selectedItem !== null && state.inventory[i].id === 'note') {
                showMsg(`紙片には『${state.cellCode}』と書かれている。`);
            }
        } else state.selectedItem = null;
        updateInventoryUI();
        updateNavButtons(rooms[state.currentRoom].nav); // 選択状態が変わったのでボタンを更新
    }
    
    function updateInventoryUI() { for(let i=0; i<4; i++) { const s = document.getElementById(`slot-${i}`); s.innerText = state.inventory[i]?.name || ""; s.classList.toggle('selected', state.selectedItem === i); } }
    function getSelectedItem() { return state.inventory[state.selectedItem]; }
    function openOverlay(h) { document.getElementById('overlay-content').innerHTML = h; document.getElementById('overlay').style.display = 'flex'; }
    function closeOverlay() { document.getElementById('overlay').style.display = 'none'; inputCode = ""; }

    function triggerWin() { state.gameEnded = true; alert("脱出成功！"); location.reload(); }
    function triggerEnd() { state.gameEnded = true; alert("看守に見つかった！"); location.reload(); }

    initRandom(); changeRoom('cell'); updateInventoryUI();
</script>
</body>
</html>
