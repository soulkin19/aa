<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slot Car Pro Racing</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        .bar-bg { width: 150px; height: 12px; background: #333; margin-bottom: 10px; border: 1px solid #555; }
        #speed-bar { width: 0%; height: 100%; background: linear-gradient(to right, #0f0, #ff0, #f00); }
        #grip-bar { width: 100%; height: 100%; background: #0088ff; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; text-align: center; display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div>SPEED</div><div class="bar-bg"><div id="speed-bar"></div></div>
        <div>GRIP</div><div class="bar-bg"><div id="grip-bar"></div></div>
        <div id="status">LAP: 1/3</div>
    </div>
    <div id="msg"></div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
let w, h, isDown = false, lap = 1, finished = false;
let p = { pos: 0, v: 0, grip: 1, out: false };
let e = { pos: 0, v: 0.008 };

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// 複雑なサーキットコース（制御点）
const points = [
    {x: 0.2, y: 0.2}, {x: 0.8, y: 0.2}, {x: 0.9, y: 0.5}, 
    {x: 0.7, y: 0.8}, {x: 0.3, y: 0.8}, {x: 0.1, y: 0.5}
];

function getPos(t) {
    t = (t % 1) * points.length;
    let i = Math.floor(t), f = t - i;
    let p1 = points[i % points.length], p2 = points[(i + 1) % points.length];
    return { x: (p1.x + (p2.x - p1.x) * f) * w, y: (p1.y + (p2.y - p1.y) * f) * h };
}

window.addEventListener('mousedown', () => isDown = true);
window.addEventListener('mouseup', () => isDown = false);
window.addEventListener('touchstart', () => isDown = true);
window.addEventListener('touchend', () => isDown = false);

function loop() {
    if(!finished) {
        // 物理演算
        if(p.out) p.v *= 0.95;
        else {
            if(isDown) p.v += 0.001 * p.grip;
            p.v += (0.002 - p.v) * 0.02; // 空気抵抗
            p.grip = Math.min(1, p.grip + 0.005); // グリップ回復
        }
        
        // コーナー判定（カーブがきつい場所で速度超過するとアウト）
        if(p.v > 0.025 && Math.random() < 0.02) {
            p.grip -= 0.1;
            if(p.grip < 0.3) p.out = true;
        }

        p.pos += p.v;
        e.pos += e.v + (Math.random()-0.5)*0.001; // CPUは揺らぎあり
        
        if(Math.floor(p.pos) > lap-1) { lap++; document.getElementById('status').innerText = `LAP: ${lap}/3`; }
        if(lap > 3) { finished = true; showMsg("WINNER!"); }
    }

    // 描画
    ctx.clearRect(0,0,w,h);
    // コース
    ctx.beginPath(); ctx.lineWidth = 40; ctx.strokeStyle = '#333';
    for(let t=0; t<=1; t+=0.01) { let p = getPos(t); if(t==0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); }
    ctx.stroke();

    drawCar(p.pos, '#0f0', 0);
    drawCar(e.pos, '#f00', 15);
    
    document.getElementById('speed-bar').style.width = (p.v * 2000) + "%";
    document.getElementById('grip-bar').style.width = (p.grip * 100) + "%";
    requestAnimationFrame(loop);
}

function drawCar(pos, color, offset) {
    let p = getPos(pos);
    ctx.fillStyle = color;
    ctx.fillRect(p.x-10, p.y-5, 20, 10);
}

function showMsg(m) {
    let msg = document.getElementById('msg');
    msg.innerText = m; msg.style.display = 'block';
}

loop();
</script>
</body>
</html>
