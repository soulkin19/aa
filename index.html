<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRISON ESCAPE: REMASTERED</title>
    <style>
        :root {
            --bg-dark: #121212; --led-red: #ff3b30; --led-green: #4cd964; --led-blue: #007aff;
            --terminal-green: #33ff33;
        }
        body { margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; color: #eee; overflow: hidden; user-select: none; touch-action: manipulation; }
        #game-view { width: 100vw; height: 100vh; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; position: relative; border-left: 2px solid #333; border-right: 2px solid #333; }
        #scene { flex: 1; position: relative; background: #1a1a1a; overflow: hidden; transition: 0.5s; }
        #room-title { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 4px; font-size: 14px; z-index: 50; border-left: 2px solid var(--led-blue); }
        
        #timer-display { position: absolute; top: 10px; right: 10px; background: rgba(180, 0, 0, 0.8); padding: 5px 10px; border-radius: 4px; font-size: 16px; font-weight: bold; color: white; z-index: 200; display: none; border: 1px solid #ff0000; }

        #inventory { height: 85px; background: #1a1a1a; display: flex; gap: 8px; padding: 10px; border-top: 2px solid #444; }
        .slot { flex: 1; height: 65px; background: #2c2c2e; border: 2px solid #555; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center; cursor: pointer; transition: 0.2s; }
        .slot.selected { border-color: var(--led-blue); box-shadow: 0 0 10px var(--led-blue); background: #3a3a3c; color: #fff; }

        #msg { position: absolute; bottom: 110px; left: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 8px; font-size: 13px; border-left: 4px solid var(--led-blue); opacity: 0; transition: 0.3s; z-index: 100; pointer-events: none; }

        .nav-btn { position: absolute; width: 55px; height: 55px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; cursor: pointer; z-index: 60; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px); }
        .nav-n { top: 70px; left: calc(50% - 27px); }
        .nav-s { bottom: 25px; left: calc(50% - 27px); }
        .nav-e { top: calc(50% - 27px); right: 15px; }
        .nav-w { top: calc(50% - 27px); left: 15px; }

        .obj { position: absolute; cursor: pointer; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .close-overlay { position: absolute; top: 20px; right: 20px; font-size: 35px; cursor: pointer; }

        .keypad { display: grid; grid-template-columns: repeat(3, 65px); gap: 12px; }
        .key { width: 65px; height: 65px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 22px; border-radius: 10px; border: 1px solid #555; }
        .display { width: 220px; height: 55px; background: #000; color: var(--led-green); text-align: center; line-height: 55px; font-size: 26px; margin-bottom: 25px; border: 2px solid #444; }

        #terminal-screen { width: 90%; height: 70%; background: #050505; color: var(--terminal-green); padding: 15px; font-size: 14px; border: 2px solid #333; overflow: hidden; }
        .laser { position: absolute; background: rgba(255, 0, 0, 0.7); box-shadow: 0 0 10px red; }
        #end-screen { position: absolute; inset: 0; background: #000; z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div id="game-view">
    <div id="scene">
        <div id="room-title">Loading...</div>
    </div>
    <div id="timer-display">TIME: 15s</div>
    <div id="nav-n" class="nav-btn nav-n">▲</div>
    <div id="nav-s" class="nav-btn nav-s">▼</div>
    <div id="nav-e" class="nav-btn nav-e">▶</div>
    <div id="nav-w" class="nav-btn nav-w">◀</div>
    <div id="msg"></div>
    <div id="inventory">
        <div class="slot" id="slot-0" onclick="selectItem(0)"></div>
        <div class="slot" id="slot-1" onclick="selectItem(1)"></div>
        <div class="slot" id="slot-2" onclick="selectItem(2)"></div>
        <div class="slot" id="slot-3" onclick="selectItem(3)"></div>
    </div>
    <div id="overlay">
        <div class="close-overlay" onclick="closeOverlay()">×</div>
        <div id="overlay-content"></div>
    </div>
    <div id="end-screen">
        <h1 id="end-title"></h1>
        <p id="end-msg"></p>
        <button onclick="location.reload()" style="padding:15px 30px; border:1px solid var(--led-blue); background:none; color:white; margin-top:20px;">RETRY</button>
    </div>
</div>

<script>
    const state = {
        currentRoom: 'cell', inventory: [], selectedItem: null,
        cellCode: "", pcPass: "", laserSequence: [], laserInput: [],
        cellDoorOpen: false, hasSpoon: false, wallScraped: false,
        hasSilverKey: false, hasStaffCard: false, wardPowerOn: false,
        mainGateOpen: false, alarmTriggered: false, alarmSeconds: 15,
        hasFlashlight: false, laserActive: true, gameEnded: false
    };

    const items = {
        spoon: { id: 'spoon', name: 'スプーン' },
        note: { id: 'note', name: '古い紙片' },
        sKey: { id: 'skey', name: '銀の鍵' },
        card: { id: 'card', name: '職員ID証' },
        rKey: { id: 'rkey', name: '錆びた鍵' },
        torch: { id: 'torch', name: 'ペンライト' }
    };

    // 初期化：ランダム要素の生成
    function initRandom() {
        state.cellCode = Math.floor(1000 + Math.random() * 9000).toString();
        const words = ["dark", "cold", "exit", "free", "fear", "hope", "evil", "jail"];
        state.pcPass = words[Math.floor(Math.random() * words.length)];
        const colors = ["cyan", "magenta", "yellow"];
        state.laserSequence = [...colors].sort(() => Math.random() - 0.5);
    }

    const rooms = {
        cell: {
            title: "独房 #101", bg: "linear-gradient(#333, #000)", nav: {},
            setup: (c) => {
                addDivObj(c, 20, 320, 200, 60, 'background:#222; border:1px solid #444;', tapBed, "BED");
                addDivObj(c, 100, 100, 80, 80, 'border-bottom:2px solid #111;', tapWall);
                addDivObj(c, 320, 50, 120, 380, 'border:4px solid #444;', tapCellDoor);
                const pColor = state.cellDoorOpen ? 'var(--led-green)' : 'var(--led-red)';
                addDivObj(c, 270, 200, 40, 60, 'background:#111; border:1px solid #333;', openKeypad);
                addDivObj(c, 285, 210, 10, 10, `background:${pColor}; border-radius:50%;`);
            }
        },
        ward: {
            title: "隔離病棟廊下", bg: "#151515", nav: { n: 'library', s: 'cafeteria', w: 'security' },
            setup: (c) => { addDivObj(c, 150, 100, 200, 300, 'color:#222; font-size:40px; font-weight:bold;', null, "H-1"); }
        },
        library: {
            title: "図書室", bg: "#2a1a10", nav: { s: 'ward' },
            setup: (c) => {
                addDivObj(c, 50, 100, 150, 200, 'background:#3d2b1f; border:2px solid #5d4037;', () => showMsg(`本に書き込みがある：『${state.cellCode}』`), "古い本棚");
                addDivObj(c, 300, 80, 120, 150, 'background:#eee; color:#000; font-size:10px; padding:5px;', null, `重要：\nPC PASSは\n逆さまに読め\n[${state.pcPass.split('').reverse().join('')}]`);
            }
        },
        security: {
            title: "セキュリティルーム", bg: "#1a1a2e", nav: { e: 'ward' },
            setup: (c) => {
                if(!state.hasStaffCard) addDivObj(c, 220, 230, 60, 40, 'background:#fff; color:#000; font-size:9px; text-align:center;', tapIdCard, "ID CARD");
            }
        },
        cafeteria: {
            title: "中央食堂", bg: "#1a1a1a", nav: { n: 'ward', s: 'kitchen', e: 'infirmary', w: 'corridor' },
            setup: (c) => { addDivObj(c, 100, 200, 300, 100, 'background:#333;', null, "DINING AREA"); }
        },
        kitchen: {
            title: "厨房", bg: "#252525", nav: { n: 'cafeteria' },
            setup: (c) => {
                if(!state.hasSilverKey) addDivObj(c, 350, 300, 40, 40, 'background:#aaa; border-radius:50%;', tapSilverKey, "KEY");
                addDivObj(c, 50, 150, 100, 150, 'background:#444;', () => showMsg("巨大な冷蔵庫だ。"), "FRIDGE");
            }
        },
        infirmary: {
            title: "医務室", bg: "#202a20", nav: { w: 'cafeteria', e: 'hidden' },
            setup: (c) => {
                addDivObj(c, 350, 100, 100, 180, 'background:#444;', tapCabinet, "CABINET");
            }
        },
        hidden: {
            title: "隠し部屋", bg: "#050505", nav: {},
            setup: (c) => {
                const it = getSelectedItem();
                if(it && it.id === 'torch') {
                    addDivObj(c, 150, 150, 200, 100, 'color:#0f0; text-shadow:0 0 5px #0f0;', null, `LASER ORDER:\n${state.laserSequence.join(' > ').toUpperCase()}`);
                }
                if(state.alarmTriggered && state.alarmSeconds <= 0) {
                    addDivObj(c, 50, 250, 80, 80, 'background:#333; border:2px solid #555;', () => { showMsg("ドアのロックを解除した。"); changeRoom('hidden'); }, "LEVER");
                    updateNavButtons({ w: 'infirmary' }); // ここで戻れるように設定
                } else {
                    showMsg("ここで息を潜めるんだ...");
                }
            }
        },
        duty: { // 隔離廊下の上にあるはずだが、ギミックとして追加
            title: "看守詰所", bg: "#2c2c2e", nav: { s: 'cafeteria' }, // 中央食堂の上に配置変更
            setup: (c) => {
                addDivObj(c, 160, 180, 180, 120, 'background:#111; border:2px solid #555;', openPc, "PC TERMINAL");
                const bColor = state.wardPowerOn ? 'var(--led-green)' : 'var(--led-red)';
                addDivObj(c, 400, 100, 60, 100, `background:#333; border:2px solid ${bColor};`, tapBreaker, "POWER");
                if(!state.hasRustyKey) addDivObj(c, 50, 100, 80, 200, 'background:#444;', tapLocker, "LOCKER");
            }
        },
        corridor: {
            title: "連絡通路", bg: "#0a0a0a", nav: { e: 'cafeteria' },
            setup: (c) => {
                if(state.laserActive) {
                    for(let i=0; i<6; i++) {
                        const l = document.createElement('div'); l.className = 'laser';
                        l.style.cssText = `left:0; top:${100 + i*50}px; width:100%; height:2px;`; c.appendChild(l);
                    }
                    addDivObj(c, 440, 200, 50, 80, 'background:#222; border:1px solid #444;', openLaserPanel, "LOCK");
                } else {
                    updateNavButtons({ e: 'cafeteria', w: 'maingate' }); // 解除後、左に行ける
                    addDivObj(c, 100, 200, 300, 50, 'color:var(--led-green);', null, "SYSTEM OFFLINE - CLEAR");
                }
            }
        },
        maingate: {
            title: "施設正門", bg: "#000", nav: { e: 'corridor' },
            setup: (c) => {
                addDivObj(c, 50, 50, 400, 400, 'border:10px double #222;', null, "GATE");
                addDivObj(c, 430, 220, 30, 60, 'background:#111; border:2px solid var(--led-blue);', tapKeyhole, "KEY");
            }
        }
    };

    function addDivObj(c, x, y, w, h, css, act, text='') {
        const e = document.createElement('div'); e.className = act ? 'obj' : '';
        e.style.cssText = `position:absolute; left:${x}px; top:${y}px; width:${w}px; height:${h}px; z-index:10; display:flex; align-items:center; justify-content:center; text-align:center; cursor:pointer; font-size:12px; ${css}`;
        if(act) e.onclick = act; e.innerText = text; c.appendChild(e);
    }

    function changeRoom(id) {
        if(id === 'security' && !state.hasSilverKey) { showMsg("「銀の鍵」が必要だ。"); return; }
        if(id === 'duty' && !state.hasStaffCard) { showMsg("「職員ID証」が必要だ。"); return; }
        state.currentRoom = id; const r = rooms[id]; const s = document.getElementById('scene');
        s.innerHTML = `<div id="room-title">${r.title}</div>`; s.style.background = r.bg;
        r.setup(s); updateNavButtons(r.nav);
    }

    function updateNavButtons(nav) {
        ['n', 's', 'e', 'w'].forEach(d => {
            const b = document.getElementById(`nav-${d}`);
            if(nav[d]) { b.style.display = 'flex'; b.onclick = () => changeRoom(nav[d]); }
            else { b.style.display = 'none'; }
        });
    }

    function showMsg(t) {
        const m = document.getElementById('msg'); m.innerText = t; m.style.opacity = 1;
        clearTimeout(state.msgTimer); state.msgTimer = setTimeout(() => m.style.opacity = 0, 3000);
    }

    // ギミック：独房のキーパッド
    let inputCode = "";
    function openKeypad() {
        if(state.cellDoorOpen) return;
        let h = `<div class="display" id="code-disp">----</div><div class="keypad">`;
        for(let i=1; i<=9; i++) h += `<div class="key" onclick="pressKey('${i}')">${i}</div>`;
        h += `<div class="key" onclick="pressKey('0')">0</div><div class="key" style="background:#444" onclick="inputCode=''">C</div><div class="key" style="background:var(--led-green)" onclick="checkCode()">OK</div></div>`;
        openOverlay(h);
    }
    function pressKey(n) { if(inputCode.length < 4) { inputCode += n; document.getElementById('code-disp').innerText = inputCode.padEnd(4, '-'); } }
    function checkCode() {
        if(inputCode === state.cellCode) { state.cellDoorOpen = true; closeOverlay(); changeRoom('cell'); showMsg("ロック解除成功。"); }
        else { showMsg("コードが違う。"); inputCode = ""; document.getElementById('code-disp').innerText = "----"; }
    }

    // ギミック：PC
    function openPc() {
        if(!state.wardPowerOn) { showMsg("電力が供給されていない。"); return; }
        openOverlay(`<div id="terminal-screen"><div id="t-out">LOGIN STAFF ID:</div><input type="text" id="t-in" style="background:none; border:none; color:var(--terminal-green); outline:none; width:100%; font-size:20px;" onkeydown="handlePC(event)"></div>`);
    }
    function handlePC(e) {
        if(e.key !== 'Enter') return;
        const val = e.target.value.toLowerCase(); const out = document.getElementById('t-out');
        if(val === "1004") { out.innerText += `\n${val}\nACCESS GRANTED.\nENTER PASSWORD:`; e.target.value = ""; }
        else if(val === state.pcPass) { out.innerText += `\nSuccess.\n[1] OPEN MAIN GATE\n[2] EXIT`; e.target.value = ""; }
        else if(val === "1") { state.mainGateOpen = true; out.innerText += `\nGATE UNLOCKED.`; showMsg("正門のロックを遠隔解除した！"); }
        else { out.innerText = "INVALID INPUT."; e.target.value = ""; }
    }

    // ギミック：レーザーパネル
    function openLaserPanel() {
        let h = `<div style="margin-bottom:20px;">SECURITY SEQUENCE</div><div style="display:flex; gap:10px;">`;
        ["cyan", "magenta", "yellow"].forEach(c => h += `<div style="width:70px; height:70px; background:${c};" onclick="tapLaserColor('${c}')"></div>`);
        h += `</div><div id="l-status" style="margin-top:20px;">INPUT...</div>`;
        openOverlay(h); state.laserInput = [];
    }
    function tapLaserColor(c) {
        state.laserInput.push(c); document.getElementById('l-status').innerText = `INPUT: ${state.laserInput.length}/3`;
        if(state.laserInput.length === 3) {
            if(JSON.stringify(state.laserInput) === JSON.stringify(state.laserSequence)) {
                state.laserActive = false; closeOverlay(); changeRoom('corridor'); showMsg("システムダウン。進めるぞ。");
            } else { showMsg("警報！順序が違う！"); triggerAlarm(); closeOverlay(); }
        }
    }

    function triggerAlarm() {
        if(state.alarmTriggered) return; state.alarmTriggered = true;
        document.getElementById('timer-display').style.display = 'block';
        const timer = setInterval(() => {
            state.alarmSeconds--; document.getElementById('timer-display').innerText = `CAUGHT IN: ${state.alarmSeconds}s`;
            if(state.alarmSeconds <= 0) {
                clearInterval(timer);
                if(state.currentRoom !== 'hidden' && !state.gameEnded) triggerEnd('CAPTURE');
                else if(state.currentRoom === 'hidden') {
                    document.getElementById('timer-display').style.display = 'none';
                    showMsg("看守たちは去った...。");
                    changeRoom('hidden');
                }
            }
        }, 1000);
    }

    // 各種タップイベント
    function tapWall() { if(getSelectedItem()?.id === 'spoon' && !state.wallScraped) { state.inventory.push(items.note); state.wallScraped = true; updateInventoryUI(); showMsg("壁を削って「古い紙片」を見つけた。"); } else showMsg("壁は冷たい。"); }
    function tapBed() { if(!state.hasSpoon) { state.hasSpoon = true; state.inventory.push(items.spoon); updateInventoryUI(); showMsg("ベッドの隙間に「スプーン」があった。"); } }
    function tapCellDoor() { if(state.cellDoorOpen) changeRoom('ward'); else showMsg("鉄格子は動かない。"); }
    function tapSilverKey() { state.hasSilverKey = true; state.inventory.push(items.sKey); updateInventoryUI(); changeRoom('kitchen'); showMsg("「銀の鍵」を手に入れた。"); }
    function tapIdCard() { state.hasStaffCard = true; state.inventory.push(items.card); updateInventoryUI(); changeRoom('security'); showMsg("「職員ID証」を手に入れた。"); }
    function tapCabinet() { if(!state.hasFlashlight) { state.hasFlashlight = true; state.inventory.push(items.torch); updateInventoryUI(); showMsg("「ペンライト」を入手。"); } }
    function tapBreaker() { if(confirm("配電盤を修理しますか？")) { state.wardPowerOn = true; changeRoom('duty'); showMsg("電力が復旧した！"); } }
    function tapLocker() { if(confirm("ロッカーをこじ開けますか？")) { state.hasRustyKey = true; state.inventory.push(items.rKey); updateInventoryUI(); triggerAlarm(); showMsg("「錆びた鍵」入手！警報が鳴った、隠れろ！"); } }
    function tapKeyhole() { if(state.mainGateOpen && getSelectedItem()?.id === 'rkey') triggerEnd('ESCAPE'); else showMsg("鍵か、あるいは遠隔操作が必要だ。"); }

    function selectItem(i) { state.selectedItem = (state.selectedItem === i) ? null : i; updateInventoryUI(); if(state.currentRoom==='hidden') changeRoom('hidden'); }
    function updateInventoryUI() { for(let i=0; i<4; i++) { const s = document.getElementById(`slot-${i}`); s.innerText = state.inventory[i]?.name || ""; s.classList.toggle('selected', state.selectedItem === i); } }
    function getSelectedItem() { return state.inventory[state.selectedItem]; }
    function openOverlay(h) { document.getElementById('overlay-content').innerHTML = h; document.getElementById('overlay').style.display = 'flex'; }
    function closeOverlay() { document.getElementById('overlay').style.display = 'none'; inputCode = ""; }

    function triggerEnd(type) {
        state.gameEnded = true; const s = document.getElementById('end-screen');
        s.style.display = 'flex';
        if(type === 'ESCAPE') { document.getElementById('end-title').innerText = "ESCAPE SUCCESS"; document.getElementById('end-msg').innerText = "あなたは自由を掴み取った。"; }
        else { document.getElementById('end-title').innerText = "GAME OVER"; document.getElementById('end-msg').innerText = "看守に捕らえられ、一生を独房で過ごすことになった。"; }
    }

    initRandom(); initGame();
    function initGame() { changeRoom('cell'); updateInventoryUI(); }
</script>
</body>
</html>
