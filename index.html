<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRISON ESCAPE: NO EXIT - CUSTOM</title>
    <style>
        :root {
            --bg-dark: #121212; --wall-stone: #3a3a3c; --iron-bar: #555;
            --led-red: #ff3b30; --led-green: #4cd964; --led-blue: #007aff;
            --terminal-green: #33ff33;
        }
        body { margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; color: #eee; overflow: hidden; user-select: none; }
        #game-view { width: 100vw; height: 100vh; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; position: relative; border-left: 2px solid #333; border-right: 2px solid #333; }
        #scene { flex: 1; position: relative; background: var(--bg-dark); overflow: hidden; transition: background 0.5s; }
        #room-title { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 4px; font-size: 14px; z-index: 50; border-left: 2px solid var(--led-blue); }
        
        /* インベントリ */
        #inventory { height: 80px; background: #1a1a1a; display: flex; gap: 8px; padding: 8px; border-top: 2px solid #444; overflow-x: auto; }
        .slot { min-width: 65px; height: 60px; background: #2c2c2e; border: 2px solid #555; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center; cursor: pointer; color: #aaa; transition: 0.2s; }
        .slot.selected { border-color: var(--led-blue); box-shadow: 0 0 8px var(--led-blue); color: #fff; background: #3a3a3c; }

        /* メッセージ */
        #msg { position: absolute; bottom: 100px; left: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.4; border: 1px solid #444; border-left: 4px solid var(--led-blue); pointer-events: none; opacity: 0; transition: 0.3s; z-index: 100; }

        /* 移動ボタン */
        .nav-btn { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; cursor: pointer; z-index: 60; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-n { top: 60px; left: calc(50% - 25px); }
        .nav-s { bottom: 20px; left: calc(50% - 25px); }
        .nav-e { top: calc(50% - 25px); right: 15px; }
        .nav-w { top: calc(50% - 25px); left: 15px; }

        .obj { position: absolute; cursor: pointer; transition: 0.2s; }
        .obj:active { transform: scale(0.95); opacity: 0.8; }

        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
        .close-overlay { position: absolute; top: 15px; right: 15px; font-size: 30px; cursor: pointer; color: #fff; width: 40px; height: 40px; text-align: center; }

        /* パズルUI */
        .keypad { display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; }
        .key { width: 60px; height: 60px; background: #333; border: 1px solid #666; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border-radius: 8px; }
        .display { width: 200px; height: 50px; background: #000; color: var(--led-green); text-align: center; line-height: 50px; font-size: 24px; margin-bottom: 20px; border: 2px solid #444; font-family: 'Digital-7', monospace; }

        #terminal-screen { width: 95%; height: 80%; background: #050505; border: 2px solid #333; color: var(--terminal-green); padding: 15px; font-size: 13px; display: flex; flex-direction: column; box-shadow: inset 0 0 20px #003300; }
        #term-output { flex: 1; overflow-y: auto; white-space: pre-wrap; margin-bottom: 10px; }
        #term-input { background: transparent; border: none; color: var(--terminal-green); outline: none; font-family: monospace; flex: 1; font-size: 16px; }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        #end-screen { position: absolute; inset: 0; background: #000; z-index: 300; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    </style>
</head>
<body>

<div id="game-view">
    <div id="scene">
        <div id="room-title">Loading...</div>
    </div>

    <div id="nav-n" class="nav-btn nav-n">▲</div>
    <div id="nav-s" class="nav-btn nav-s">▼</div>
    <div id="nav-e" class="nav-btn nav-e">▶</div>
    <div id="nav-w" class="nav-btn nav-w">◀</div>

    <div id="msg"></div>

    <div id="inventory">
        <div class="slot" id="slot-0" onclick="selectItem(0)"></div>
        <div class="slot" id="slot-1" onclick="selectItem(1)"></div>
        <div class="slot" id="slot-2" onclick="selectItem(2)"></div>
        <div class="slot" id="slot-3" onclick="selectItem(3)"></div>
        <div class="slot" id="slot-4" onclick="selectItem(4)"></div>
    </div>

    <div id="overlay">
        <div class="close-overlay" onclick="closeOverlay()">×</div>
        <div id="overlay-content"></div>
    </div>

    <div id="end-screen">
        <h1 id="end-title" style="font-size:28px; margin-bottom:20px;"></h1>
        <p id="end-msg" style="font-size:16px; line-height:1.6; color:#ccc; margin-bottom:40px;"></p>
        <button onclick="location.reload()" style="padding:15px 30px; background:#222; color:white; border:1px solid var(--led-blue); cursor:pointer; border-radius:4px;">RETRY</button>
    </div>
</div>

<script>
    const state = {
        currentRoom: 'cell', inventory: [], selectedItem: null,
        wallScraped: false, hasSpoon: false, cellDoorOpen: false,
        hasStaffCard: false, wardPowerOn: false, pcLoggedIn: false,
        hasRustyKey: false, mainGateOpen: false, alarmTriggered: false,
        gameEnded: false
    };

    const items = {
        spoon: { id: 'spoon', name: 'スプーン' },
        note: { id: 'note', name: '紙片[8241]' },
        card: { id: 'card', name: '職員ID証' },
        key: { id: 'key', name: '錆びた鍵' }
    };

    const codes = { cellDoor: "8241", pcPass: "evil" };

    const rooms = {
        cell: {
            title: "独房 #101",
            bg: "linear-gradient(to bottom, #2c2c2e, #000)",
            nav: {},
            setup: (c) => {
                // 壁のひび割れ（中央）
                addSvgObj(c, 'crack', 100, 100, 120, 120, '<path d="M10,60 Q30,20 60,60 T110,60" stroke="#111" fill="none" stroke-width="3"/>', tapWall);
                // ベッド（左下）
                addSvgObj(c, 'bed', 20, 300, 220, 120, '<rect x="0" y="40" width="200" height="60" rx="5" fill="#222"/><rect x="10" y="30" width="60" height="30" rx="2" fill="#333"/>', tapBed);
                // 鉄格子（右側全体）
                addSvgObj(c, 'door', 320, 50, 150, 400, '<rect x="0" y="0" width="10" height="400" fill="#555"/><rect x="40" y="0" width="10" height="400" fill="#555"/><rect x="80" y="0" width="10" height="400" fill="#555"/><rect x="120" y="0" width="10" height="400" fill="#555"/><rect x="0" y="150" width="150" height="15" fill="#444"/>', tapCellDoor);
                // パネル（鉄格子の横）
                const pColor = state.cellDoorOpen ? 'var(--led-green)' : 'var(--led-red)';
                addDivObj(c, 'panel', 270, 200, 40, 60, `background:#1a1a1a; border:2px solid #333; display:flex; flex-direction:column; align-items:center; justify-content:center;`, openKeypad);
                addDivObj(c, 'led', 283, 210, 14, 14, `background:${pColor}; border-radius:50%; box-shadow: 0 0 5px ${pColor}; pointer-events:none;`);
            }
        },
        ward: {
            title: "隔離病棟廊下",
            bg: "#151515",
            nav: { n: 'duty', s: 'storage', e: 'maingate', w: 'security' },
            setup: (c) => {
                addSvgObj(c, 'hall', 0, 0, 500, 500, '<path d="M150,150 L350,150 L500,0 L0,0 Z" fill="#222"/><path d="M150,350 L350,350 L500,500 L0,500 Z" fill="#222"/>', null, true);
                addDivObj(c, 'backcell', 10, 180, 60, 140, 'background:#333; border:1px solid #555;', () => changeRoom('cell'), "CELL");
                addDivObj(c, 'graffiti', 180, 240, 140, 50, 'color:#2a2a2a; font-size:24px; transform:rotate(-5deg); font-weight:bold; font-family:serif;', null, "L I V E");
            }
        },
        duty: {
            title: "看守詰所",
            bg: "#2c2c2e",
            nav: { s: 'ward' },
            setup: (c) => {
                addSvgObj(c, 'pc', 160, 180, 180, 150, '<rect x="0" y="0" width="180" height="110" rx="5" fill="#555"/><rect x="10" y="10" width="160" height="90" fill="#000"/><rect x="40" y="110" width="100" height="20" fill="#444"/>', openPc);
                const bColor = state.wardPowerOn ? 'var(--led-green)' : 'var(--led-red)';
                addSvgObj(c, 'breaker', 380, 100, 70, 100, `<rect x="0" y="0" width="70" height="100" fill="#444" stroke="#666"/><circle cx="35" cy="40" r="12" fill="${bColor}"/>`, tapBreaker);
                addSvgObj(c, 'locker', 40, 120, 80, 260, '<rect x="0" y="0" width="80" height="260" fill="#3a3a3c" stroke="#555"/><rect x="50" y="120" width="10" height="40" fill="#222"/>', tapLocker);
            }
        },
        security: {
            title: "セキュリティルーム",
            bg: "#1a1a2e",
            nav: { e: 'ward' },
            setup: (c) => {
                addDivObj(c, 'desk', 100, 250, 300, 150, 'background:#4a3b31; border-top:5px solid #222;');
                if(!state.hasStaffCard) {
                    addDivObj(c, 'idcard', 220, 230, 60, 40, 'background:#eee; border-radius:3px; color:#000; font-size:8px; display:flex; align-items:center; justify-content:center; font-weight:bold; box-shadow:0 2px 5px rgba(0,0,0,0.5);', tapIdCard, "STAFF ID");
                }
                addDivObj(c, 'monitor', 150, 100, 200, 120, 'background:#111; border:4px solid #333; color:rgba(0,255,0,0.2); font-size:10px; padding:5px; overflow:hidden;', null, "CAM_01: ACTIVE\nCAM_02: SIGNAL LOST\nCAM_03: ACTIVE");
            }
        },
        storage: {
            title: "地下倉庫",
            bg: "#0d0d0d",
            nav: { n: 'ward' },
            setup: (c) => {
                addSvgObj(c, 'machine', 80, 180, 180, 180, '<rect x="0" y="0" width="180" height="180" fill="#333" stroke="#222"/><circle cx="90" cy="90" r="50" fill="#111"/><path d="M90,40 L90,140 M40,90 L140,90" stroke="#222"/>', () => showMsg("巨大な発電機だ。耳障りな音がしている。"));
                addSvgObj(c, 'duct', 360, 40, 100, 100, '<rect x="0" y="0" width="100" height="100" fill="#000" stroke="#333"/><path d="M0,0 L100,100 M100,0 L0,100" stroke="#333" stroke-width="2"/>', tapDuct);
            }
        },
        maingate: {
            title: "施設正門",
            bg: "#050505",
            nav: { w: 'ward' },
            setup: (c) => {
                addSvgObj(c, 'gate', 50, 50, 400, 400, '<rect x="0" y="0" width="400" height="400" fill="#111" stroke="#222" stroke-width="8"/><path d="M200,0 L200,400" stroke="#222" stroke-width="4"/>', tapMainGate);
                const kColor = state.mainGateOpen ? 'var(--led-green)' : 'var(--led-blue)';
                addDivObj(c, 'keyhole', 425, 220, 30, 60, `background:#222; border:2px solid ${kColor}; border-radius:5px; box-shadow:0 0 10px ${kColor}`, tapKeyhole);
            }
        }
    };

    // --- Core Logic ---
    function initGame() { changeRoom('cell'); updateInventoryUI(); showMsg("暗い独房で目が覚めた。脱出の時だ。"); }

    function changeRoom(id) {
        if(id === 'security' && !state.hasRustyKey) { showMsg("扉は施錠されている。「錆びた鍵」が必要だ。"); return; }
        state.currentRoom = id;
        const r = rooms[id];
        const s = document.getElementById('scene');
        s.innerHTML = `<div id="room-title">${r.title}</div>`;
        s.style.background = r.bg;
        r.setup(s);
        updateNavButtons(r.nav);
    }

    function updateNavButtons(nav) {
        ['n', 's', 'e', 'w'].forEach(d => {
            const b = document.getElementById(`nav-${d}`);
            if(nav[d]) { b.style.display = 'flex'; b.onclick = () => changeRoom(nav[d]); }
            else { b.style.display = 'none'; }
        });
    }

    function addSvgObj(c, id, x, y, w, h, svg, act, isBg=false) {
        const e = document.createElement('div');
        e.id = `obj-${id}`; e.className = isBg ? '' : 'obj';
        e.style.cssText = `position:absolute; left:${x}px; top:${y}px; width:${w}px; height:${h}px; z-index:${isBg ? 1 : 10};`;
        if(act) e.onclick = act;
        e.innerHTML = `<svg viewBox="0 0 ${w} ${h}" width="100%" height="100%">${svg}</svg>`;
        c.appendChild(e);
    }

    function addDivObj(c, id, x, y, w, h, css, act, text='') {
        const e = document.createElement('div');
        e.id = `obj-${id}`; e.className = act ? 'obj' : '';
        e.style.cssText = `position:absolute; left:${x}px; top:${y}px; width:${w}px; height:${h}px; z-index:11; ${css}`;
        if(act) e.onclick = act;
        e.innerText = text; c.appendChild(e);
    }

    function showMsg(t) {
        const m = document.getElementById('msg'); m.innerText = t; m.style.opacity = 1;
        clearTimeout(state.msgTimer);
        state.msgTimer = setTimeout(() => m.style.opacity = 0, 3000);
    }

    function updateInventoryUI() {
        for(let i=0; i<5; i++) {
            const s = document.getElementById(`slot-${i}`);
            s.innerText = state.inventory[i] ? state.inventory[i].name : "";
            s.classList.remove('selected');
            if(state.selectedItem === i) s.classList.add('selected');
        }
    }

    function selectItem(i) {
        if(state.inventory[i]) state.selectedItem = (state.selectedItem === i) ? null : i;
        else state.selectedItem = null;
        updateInventoryUI();
    }

    function getSelectedItem() { return state.inventory[state.selectedItem]; }
    function openOverlay(h) { document.getElementById('overlay-content').innerHTML = h; document.getElementById('overlay').style.display = 'flex'; }
    function closeOverlay() { document.getElementById('overlay').style.display = 'none'; inputCode = ""; }

    // Actions
    function tapBed() { if(!state.hasSpoon) { showMsg("ベッドの足元に「スプーン」が落ちていた。"); state.inventory.push(items.spoon); state.hasSpoon = true; updateInventoryUI(); } else showMsg("冷たい鉄製のベッドだ。"); }
    function tapWall() {
        const it = getSelectedItem();
        if(it && it.id === 'spoon') {
            if(!state.wallScraped) { showMsg("壁を削ると奥から「紙片」が出てきた。"); state.inventory.push(items.note); state.wallScraped = true; updateInventoryUI(); }
            else showMsg("これ以上は削れない。");
        } else showMsg("壁が脆くなっている。道具があれば削れそうだ。");
    }
    function tapCellDoor() { if(state.cellDoorOpen) changeRoom('ward'); else showMsg("電子ロックがかかっている。"); }
    
    let inputCode = "";
    function openKeypad() {
        if(state.cellDoorOpen) return;
        const h = `<div class="display" id="code-disp">----</div><div class="keypad">` + 
            [1,2,3,4,5,6,7,8,9,0].map(n => `<div class="key" onclick="pressKey('${n}')">${n}</div>`).join('') + 
            `<div class="key" style="background:var(--led-green)" onclick="checkCode()">OK</div></div>`;
        openOverlay(h);
    }
    function pressKey(n) { if(inputCode.length < 4) { inputCode += n; document.getElementById('code-disp').innerText = inputCode.padEnd(4, '-'); } }
    function checkCode() {
        if(inputCode === codes.cellDoor) { state.cellDoorOpen = true; closeOverlay(); changeRoom('cell'); showMsg("扉のロックが解除された。"); }
        else { document.getElementById('code-disp').classList.add('shake'); setTimeout(() => { inputCode = ""; document.getElementById('code-disp').innerText = "----"; document.getElementById('code-disp').classList.remove('shake'); }, 400); }
    }

    function tapBreaker() { if(!state.wardPowerOn) openBreakerPuzzle(); else showMsg("電源は安定している。"); }
    function openBreakerPuzzle() {
        const h = `<div style="text-align:center; margin-bottom:15px;">回路修復: Red + Blue = ?</div><div style="display:flex; gap:10px;">` + 
            ['yellow','magenta','cyan'].map(c => `<div style="width:50px; height:50px; background:${c}; cursor:pointer;" onclick="solveBreaker('${c}')"></div>`).join('') + `</div>`;
        openOverlay(h);
    }
    function solveBreaker(c) { if(c === 'magenta') { state.wardPowerOn = true; closeOverlay(); changeRoom('duty'); showMsg("電力が復旧した。"); } else { triggerAlarm(); closeOverlay(); } }

    function tapLocker() {
        if(!state.hasRustyKey) { if(confirm("ロッカーをこじ開けますか？（音が鳴ります）")) { showMsg("「錆びた鍵」を手に入れた！警報が鳴り響く！"); state.inventory.push(items.key); state.hasRustyKey = true; updateInventoryUI(); triggerAlarm(); } }
        else showMsg("ロッカーの中は空だ。");
    }

    function tapIdCard() { showMsg("「職員ID証」を入手した。ID番号は「1004」と記されている。"); state.inventory.push(items.card); state.hasStaffCard = true; updateInventoryUI(); changeRoom('security'); }

    function openPc() {
        if(!state.wardPowerOn) { showMsg("電力が供給されていない。"); return; }
        openOverlay(`<div id="terminal-screen"><div id="term-output">S.A.F.T. Terminal System\nInput Staff ID:</div><div style="display:flex;">> <input type="text" id="term-input" onkeydown="handleTerm(event)" autofocus></div></div>`);
        state.termStage = 'id';
    }

    function handleTerm(e) {
        if(e.key !== 'Enter') return;
        const i = e.target.value.toLowerCase().trim(); const out = document.getElementById('term-output'); e.target.value = '';
        if(state.termStage === 'id') {
            if(state.hasStaffCard && i === '1004') { out.innerText += `\n${i}\nID Verified.\nInput Password:`; state.termStage = 'pass'; }
            else { out.innerText += `\n${i}\nInvalid ID.`; if(!state.hasStaffCard) showMsg("IDカードが必要だ。"); }
        } else if(state.termStage === 'pass') {
            if(i === codes.pcPass) { out.innerText += `\n****\nLogin Success.\n1. Unlock Main Gate\n2. Exit`; state.termStage = 'menu'; }
            else { triggerAlarm(); closeOverlay(); }
        } else if(state.termStage === 'menu') {
            if(i === '1') { state.mainGateOpen = true; showMsg("正門の電子ロックを解除した。"); out.innerText += `\n1\nGATE UNLOCKED.`; }
            else if(i === '2') closeOverlay();
        }
    }

    function tapDuct() { if(confirm("ダクトに入りますか？")) startDuctMaze(); }
    function startDuctMaze() { state.ductPos = 0; openOverlay(`<div id="duct-t" style="margin-bottom:20px;">真っ暗だ。左から風が吹く。</div><button onclick="moveDuct('l')">左</button> <button onclick="moveDuct('r')">右</button>`); }
    function moveDuct(d) {
        state.ductPos++; const t = document.getElementById('duct-t');
        if(state.ductPos === 1 && d === 'l') t.innerText = "道が分かれている。左が明るい。";
        else if(state.ductPos === 2 && d === 'l') t.innerText = "出口が見えた！";
        else if(state.ductPos === 3 && d === 'l') triggerEnd('B');
        else { triggerAlarm(); closeOverlay(); }
    }

    function tapMainGate() { showMsg(state.mainGateOpen ? "電子ロックは解除されている。" : "巨大な門だ。"); }
    function tapKeyhole() {
        if(!state.mainGateOpen) { showMsg("まずは電子ロックを解除しろ。"); return; }
        const it = getSelectedItem();
        if(it && it.id === 'key') triggerEnd('A');
        else showMsg("物理鍵が必要だ。");
    }

    function triggerAlarm() {
        if(state.alarmTriggered) return;
        state.alarmTriggered = true; document.getElementById('scene').style.background = "#411";
        showMsg("【⚠警報⚠】看守が来るぞ！急げ！");
        setTimeout(() => { if(!state.gameEnded) triggerEnd('C'); }, 15000);
    }

    function triggerEnd(type) {
        state.gameEnded = true; closeOverlay();
        const s = document.getElementById('end-screen'); const t = document.getElementById('end-title'); const m = document.getElementById('end-msg');
        s.style.display = 'flex';
        if(type === 'A') { t.innerText = "END A: TRUE FREEDOM"; t.style.color = "var(--led-green)"; m.innerText = "正門を突破し、君は自由を手に入れた。"; }
        else if(type === 'B') { t.innerText = "END B: ESCAPE TO DARK"; t.style.color = "var(--led-blue)"; m.innerText = "ダクトを抜け、未知の地下道へ脱出した。"; }
        else { t.innerText = "END C: CAPTURED"; t.style.color = "var(--led-red)"; m.innerText = "看守に包囲された。脱出失敗だ。"; }
    }

    window.onload = initGame;
</script>
</body>
</html>
